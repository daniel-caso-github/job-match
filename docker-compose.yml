x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: job-match-airflow:dev
  env_file:
    - path: .env
      required: false
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    PIPELINE_API_URL: http://api:8000
  volumes:
    - ./dags:/opt/airflow/dags:ro
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  app-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: jobmatch
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d jobmatch"]
      interval: 5s
      retries: 10

  # Servicio multi-uso para tests, CLIs y alembic.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-match-pipeline:dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@app-db:5432/jobmatch
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
    working_dir: /app
    depends_on:
      app-db:
        condition: service_healthy
    command: pytest -v

  # FastAPI con uvicorn --reload.
  api:
    image: job-match-pipeline:dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@app-db:5432/jobmatch
      AIRFLOW_API_URL: http://airflow-webserver:8080
      AIRFLOW_API_USER: ${AIRFLOW_API_USER:-admin}
      AIRFLOW_API_PASSWORD: ${AIRFLOW_API_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-32b}
    volumes:
      - ./src:/app/src:ro
    working_dir: /app
    depends_on:
      app-db:
        condition: service_healthy
    command:
      - uvicorn
      - src.interfaces.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    image: job-match-frontend:dev
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:3000:3000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
      - airflow-webserver
      - grafana

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d

  loki:
    image: grafana/loki:3.0.0
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create -u admin -p admin -r Admin -e admin@local -f a -l a || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  app-db-data:
  airflow-db-data:
  prometheus-data:
  loki-data:
  grafana-data:
