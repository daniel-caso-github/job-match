# Fase 1-2 (recolección + extracción) + pre-bootstrap fase 3/4/5
# (Postgres+pgvector + FastAPI).
# Fase 5 sumará: airflow-webserver, airflow-scheduler, airflow-db.
services:
  app-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: jobmatch
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d jobmatch"]
      interval: 5s
      retries: 10

  # Servicio multi-uso para tests, CLIs y alembic.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-match-pipeline:dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@app-db:5432/jobmatch
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      # alembic mounted rw because `alembic revision` writes new migration files.
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
    working_dir: /app
    depends_on:
      app-db:
        condition: service_healthy
    command: pytest -v

  # FastAPI con uvicorn --reload. Comparte imagen y env con `app`.
  api:
    image: job-match-pipeline:dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@app-db:5432/jobmatch
    volumes:
      - ./src:/app/src:ro
    working_dir: /app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      app-db:
        condition: service_healthy
    command:
      - uvicorn
      - src.interfaces.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

volumes:
  app-db-data:
